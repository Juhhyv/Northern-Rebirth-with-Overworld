#define BOOK X Y
	[event]
        	name=moveto
    	    	[filter]
			side=1
		[/filter]
		[filter]
			x= {X}
			y= {Y}
		[/filter]
	        [message]
			speaker=narrator
			message= _ "You found useful book."
	[/message]
		[set_variable]
					name=books_found
					add=1
		[/set_variable]
		[remove_item]
					[filter]
						x={X}
						y={Y}
					[/filter]
		[/remove_item]

	   [/event]

	[event]
		name=prestart
		{PLACE_IMAGE items/book3.png {X} {Y}}
	[/event]
#enddef





