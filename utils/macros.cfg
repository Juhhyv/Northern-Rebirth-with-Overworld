   		 {PLACE_IMAGE "{IMAGE}~RC(magenta>red)~BLIT(items/cage.png)" {X} {Y}}
	#enddef

	
	#Also this is from original NR

#define TREASURY_GOLD_EVENT _X _Y _AMOUNT _MESSAGE
    [event]
        name=moveto
        [filter]
            x,y={_X},{_Y}
            side=1
        [/filter]

        [message]
            speaker=unit
            message={_MESSAGE}
        [/message]

        [sound]
            name=gold.ogg
        [/sound]

        [gold]
            side=1
            amount={_AMOUNT}
        [/gold]

        [floating_text]
            x,y={_X},{_Y}
            color=225,225,25
            text={_AMOUNT}
        [/floating_text]

        [remove_item]
            x,y=$x1,$y1
        [/remove_item]
    [/event]
#enddef


	# This macro is taken from Heir 2 the trone

#define SILENTLY_LIMIT_LEADER_MOVES SIDE MOVES
    [event]
        name=side {SIDE} turn refresh
        first_time_only=no
        id=limit_moves_leader{SIDE}
        # only limit moves if we're already standing on a keep - otherwise we might get stuck somewhere far away
        [filter_condition]
            [have_unit]
                side={SIDE}
                canrecruit=yes
                [filter_location]
                    terrain=K*^*,*^K*
                [/filter_location]
            [/have_unit]
        [/filter_condition]

	   # opened macro from core
	[store_unit]
        [filter]
            side={SIDE}
		canrecruit=yes
        [/filter]

        variable=MODIFY_UNIT_store
        kill=yes
    [/store_unit]

    [foreach]
        array=MODIFY_UNIT_store
        [do]
            [set_variable]
                name=this_item.moves
                value={MOVES}
            [/set_variable]

            [unstore_unit]
                variable=this_item
                find_vacant=no
            [/unstore_unit]
        [/do]
    [/foreach]

    {CLEAR_VARIABLE MODIFY_UNIT_store}

    [/event]
#enddef
 
