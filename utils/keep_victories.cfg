#define BASICVICTORY X Y SAVE

	[if]
					[variable]
						name={SAVE}
						equals=yes
					[/variable]
					[then]
					[remove_item]
						x, y={X}, {Y}
					[/remove_item]
					[remove_shroud]
              				      x,y,radius={X}, {Y}, 5
         				[/remove_shroud]

					[/then]
	[/if]

#enddef
