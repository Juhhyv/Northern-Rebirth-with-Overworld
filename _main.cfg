[/textdomain]



[campaign]
    id=NR_openwordll
    icon="units/human-peasants/peasant-idle-7.png"
    name= _ "Northern Rebirth with Overworld"
    abbrev= _ "NRO"
    start_year="534 YW"
    end_year="540 YW"
	image="data/add-ons/NR_openword/images/talin.png"
	background="data/campaigns/The_Rise_Of_Wesnoth/images/story/trow_story_03-A_Harrowing_Escape.webp~FL()"
    first_scenario=01_Breaking_the_Chains
    define="NR_openwordll"
    description=_ "People of Dwarven doors has been enslaved for generations. But while orcs fight each other slaves have change to rebel. Help Talin to escape slavery and defeat both darkness hiding under Heart Mountains and Bloody Sword tribe.

Unbalanced, 10 scenarios"

    {CAMPAIGN_DIFFICULTY EASY    "units/human-peasants/peasant.png~RC(magenta>red)" ( _ "Normal") ( _ "1x enemies")}
	{CAMPAIGN_DIFFICULTY NORMAL "units/human-loyalists/lieutenant.png~RC(magenta>red)" ( _ "Challencing") ( _ "1.25x enemies ")}
    {CAMPAIGN_DIFFICULTY HARD   "units/human-loyalists/general.png~RC(magenta>red)"     ( _ "Deadly") ( _ "1.75x enemies")}
     {CAMPAIGN_DIFFICULTY NIGHTMARE "units/human-loyalists/marshal.png~RC(magenta>red)"       ( _ "Nigthmare") ( _ "4x enemies, 2x gold")}


    # Geographical and historical assumptions:
