#textdomain wesnoth-NRO


[scenario]
    id=12_elvish_route
    name= _ "12 Elfish Route"
    map_file=12_elvish_route.map
    turns=30
    next_scenario=openwordl
  victory_when_enemies_defeated=no

	carryover_percentage=40
    {DEFAULT_SCHEDULE}
    
   #Talin
   
    [side]
        side=1
        controller=human
        gold={ON_DIFFICULTY4 200 200 200 400}
        team_name=alliance
      	type=Peasant
        id=talin
        name= _ "Talin"
        side=1
        canrecruit=yes
        team_name=alliance
        user_team_name=_"Talin"

           [/side]
    
  
	    # Undead sides
        

    
    [side]
        side=2
        controller=ai
        recruit=Skeleton,Skeleton Archer
        gold={ON_DIFFICULTY4 200 250 350 800}
	income={ON_DIFFICULTY4 15 20 25 50}
        team_name=undead
	color=black
        user_team_name= _ "Undead"
        {FLAG_VARIANT undead}

        type=Banebow
        canrecruit=yes
    [/side]


    [side]
        side=3
        controller=ai
        recruit=Skeleton,Skeleton Archer
        gold={ON_DIFFICULTY4 100 125 175 400}
        
	color=black
        team_name=undead
        user_team_name= _ "Undead"
        {FLAG_VARIANT undead}

        type=Skeleton Archer
        canrecruit=yes

    [/side]

	  # Elves
    [side]
        side=4
        controller=ai
       	recruit=Elvish Archer , Elvish Fighter
        gold={ON_DIFFICULTY4 200 250 300 400}
        team_name=alliance
        user_team_name= _ "Elves"
	id=captain
	side=2
	color=green
	type="Elvish Captain"
	canrecruit=yes
    [/side]

   
    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Destroy all undead leaders"
                condition=win
            [/objective]
	[objective]
                description= _ "Then move Talin to signpost (12, 1)"
                condition=win
            [/objective]

            [objective]
                description= _ "Death of Tallin"
                condition=lose
            [/objective]
            [objective]
                description= _ "The elves are defeated"
                condition=lose
            [/objective]

            {TURNS_RUN_OUT}

            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
       
        {RECALLCOMPANIONS}
    [/event]

    # Start event
    [event]
        name=start
	[unit]
		name= _"Eryssa"
		type=Elvish Sorceress
		side=4
		canrecruit=no
		gender=female
		id=eryssa
		x=12
		y=27
		[modifications]
                {TRAIT_LOYAL}
                {TRAIT_RESILIENT}
            [/modifications]
	[/unit]
	[if]
					[variable]
						name=treasury_stealed
						equals=yes
					[/variable]
					[then]


	
	[message]
            speaker=captain
            message= _ "Those humans that helped saurians to steal our treasury are there. Prepaire to fight"
        [/message]
        [message]
            speaker=talin
            message= _ "We are here to defeat undeads and continue our journey to underground."
        [/message]
	[message]
            speaker=captain
            message= _ "Liar! You will die!"
        [/message]
	[modify_side]
			side=2
			team_name=elves
	[/modify_side]

	 [message]
            speaker=talin
            message= _ "We need to try avoid fighting with elves and contunue our journey to underground."
        [/message]
					[/then]
					[else]
						 [message]
          						  speaker=talin
       							     message= _ "We are here to defeat undeads and continue our journey to underground. Will you help us?"
   						[/message]
						[message]
            						speaker=captain
         						   message= _ "Elves don't like underground areas. But we can help you to defeat undeads here."
       						[/message]
						[message]
            						speaker=eryssa
         						   message= _ "My farie fire is effective against undeads. I join you."
       						[/message]
						[modify_unit]
							[filter]
								id=eryssa
							[/filter]
							side=1
						[/modify_unit]
					[/else]
	[/if]


    
	{HIGHLIGHT_IMAGE 12 1 scenery/signpost.png ()}
	[/event]

    
     #Talin Reach Signpost
	[event]
        name=moveto
	first_time_only=no
        [filter]
            side=1
            [filter_location]
                x,y=12,1
            [/filter_location]
        [/filter]
       
       
	[if]
					[have_unit]
						race=undead
						canrecruit=yes
					[/have_unit]
					[then]
						 [message]
            						speaker=talin
       							     message= _ "We need to destroy undead leaders before going underground or we risk being surrounded."
   					     [/message]		
					[/then]
					[else]
						[message]
            						speaker=captain
       							     message= _ "We are not good in fighting underground."
   					     [/message]
						[endlevel]
        	 					  result=victory
       							   bonus=yes
						[/endlevel]
					[/else]
	[/if]

    [/event]

	            
    # Elves got killed, the scenario is lost.
    [event]
        name=die
        [filter]
            id=captain
        [/filter]
		
 	[message]
            speaker=talin
            message= _ "We were too slow in defeating undeads. I don’t think we can fight for much longer without elves!"
        [/message]

   	[endlevel]
            result=defeat
        [/endlevel]
    [/event]
       
	
    {LASTBREATHTALIN}
[/scenario]
