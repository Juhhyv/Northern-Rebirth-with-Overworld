	[event]
		name=leave
		[message]
			speaker=morvin
			message= _ " We found enough books. We should investigate them more once we have returned to Alduin."
		[/message]
		[message]
			speaker=talin
			message= _ " We leave now."
		[/message]
						[endlevel]
        	 					  result=victory
       							   bonus=yes
							next_scenario=overworld 
							carryover_add=yes
						[/endlevel]		
	[/event]

	#Add this to every scenario where smalltalk is used. (expext 21 Abez)
[event]
        name=turn 7
        [fire_event]
		name=say_smalltalk
	[/fire_event]
[/event]
{GLOBAL__SMALLTALK}
		
	[event]
		name=new turn
		first_time_only=no
		[if]
			[variable]
				name=books_found
				equals=8
			[/variable]
			[then]
				[fire_event]
					name=recruit_mages
				[/fire_event]

				[fire_event]
					name=leave
				[/fire_event]
			[/then]
 		[/if]
	[/event]

	
		
{PICKUPPABLE_ITEM  id=holy_amulet 25 20 side=1 items/ankh-necklace.png
