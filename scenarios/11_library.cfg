#textdomain wesnoth-NRO


[scenario]
  	  name= _ "11 Library"
	id=11_library
	map_data="{~add-ons/NR_openword/maps/11_library.map}"
	turns=35
	victory_when_enemies_defeated=no
	next_scenario=overworld 
	carryover_percentage=40
	 {DEFAULT_SCHEDULE}
	
[side]
        side=1
        controller=human
        gold={ON_DIFFICULTY4 75 75 75 150}
        team_name=alliance
        user_team_name= _ "Talin"
        facing=nw
	save_id=talin
	type=Peasant
        id=talin
	shroud=yes
        name=_ "Talin"
        canrecruit=yes
  [/side]

[side]
        side=2
        controller=ai
        gold={ON_DIFFICULTY4 120 150 200 480}
        team_name=wildlife
        user_team_name= _ "Wildlife"
        facing=nw
	type=Giant Ant Queen
        id=enemy
        name=_ "Ant Queen"
        canrecruit=yes
	recruit=Giant Ant, Soldier Ant

  [/side]

[side]
        side=3
        controller=ai
        gold={ON_DIFFICULTY4 120 150 200 480}
        team_name=guardians
        user_team_name= _ "Magic guards"
       no_leader=yes
  [/side]

#define GUARD X Y

	[unit]
		type=Granite Golem
		side=3
		x={X}
		y={Y}
		max_moves=0
	[/unit]
#enddef 



	[event]
		name=prestart
		 [objectives]
                       [objective]
             		   description= _ "Find books."
           		     condition=win
                       [/objective]
			[objective]
				description= _ "Death of Talin"
				condition=lose
			[/objective]
			note=_ "Move unit on book to read it."
		[/objectives]
		[set_variable]
					name=books_found
					value=0
		[/set_variable]
