#textdomain wesnoth-NRO


[scenario]
  	  name= _ "23 Jotha "
	id=23_jotha 
	map_data="{~add-ons/NR_openword/maps/23_jotha.map}" 
	turns=40
	next_scenario=openwordl_later
	{DEFAULT_SCHEDULE_MORNING}
	carryover_percentage=40

	
[side]
        side=1
        controller=human
        gold={ON_DIFFICULTY4 150 150 150 300}
        team_name=alliance
        user_team_name= _ "Talin"
        facing=nw
	save_id=talin
	type=Peasant
        id=talin
        name=_ "Talin"
        canrecruit=yes

  [/side]
	[side]
		side=2
       		 controller=ai
       		 gold={ON_DIFFICULTY4 250 325 400 1000}
        team_name=orcs
        user_team_name= _ "Bloody Sword"
        facing=nw
	type=Orcish Warlord
    	color=purple
        canrecruit=yes
	recruit=Orcish Grunt,Orcish Archer,Wolf Rider,Orcish Assassin,Troll Whelp
	id=enemy
	[/side]
	
	[side]
		side=3
       		 controller=ai
       		 gold={ON_DIFFICULTY4 300 375 550 1200}
        team_name=orcs
        user_team_name= _ "Bloody Sword"
        facing=nw
	type=Orcish Warlord
	color=purple
        canrecruit=yes
	recruit=Orcish Assassin,Naga Fighter, Saurian Skirmisher, Orcish Barge, Orcish Warship

	[/side]
	

[side]
        name=_"Pokalu"
	side=4
	id=merman
	color=blue
	type=Merman Hoplite
        recruit=Merman Hunter, Mermaid Initiate, Merman Fighter
        gold={ON_DIFFICULTY4 300 350 400 700}
	canrecruit=yes
        team_name=alliance
        user_team_name=_"Jotha "
[/side]

	


	[event]
		name=prestart
		 [objectives]
                       [objective]
             		   description= _ "Defeat Enemy leaders"
           		     condition=win
                       [/objective]
			[objective]
				description= _ "Death of Talin"
				condition=lose
			[/objective]
			[objective]
				description= _ "Death of Pokalu"
				condition=lose
			[/objective]
				[gold_carryover]
              				bonus=yes
            			 	carryover_percentage=40
      				[/gold_carryover]


		[/objectives]

	
	[/event]
	[event]
        name=start
	{RECALLCOMPANIONS}
        [message]
            speaker=talin
            message= _ "Bloody Sword is attacking against Jotha. We need to help them to defend."
        [/message]
	[message]
            speaker=merman
            message= _ "Get out orcs! This is our home."
        [/message]
	[message]
            speaker=enemy
            message= _ "Hah! With our ally's ships we will defeat you easily."
        [/message]
	[message]
            speaker=talin
            message= _ "We need to stop them."
        [/message]
	    
	[/event]

	{LASTBREATHTALIN}
	
	[event]
		name=last_breath
		[filter]
			id=enemy
		[/filter]
		[message]
			speaker=enemy
			message= _ "Great Chief will not like this..."
		[/message]
	[/event]
	[event]
		name=last_breath
		[filter]
			id=merman
		[/filter]
		[message]
			speaker=ikhig
			message= _ "This is end of Jotha ..."
		[/message]
		[endlevel]
        	  	 result=defeat
      		[/endlevel]

	[/event]
	

	[event]
        name=victory

        [message]
            speaker=merman
            message= _ "<i>Yes</i>! We survived!"
        [/message]

         [message]
            speaker=talin
            message= _ "Bloody Swordwill try again to take our home if they are not dealt. Want you join us attack to Glamdrol? "
        [/message]
	[message]
            speaker=merman
            message= _ "There don't seem be an alternative to that."
        [/message]
       [set_variable]
                       name=jotha_allied
                       value=yes
       [/set_variable]

       
    [/event]

	
	{LASTBREATHTALIN}
[/scenario]







