#Tell redward

{PLACE_POI 78 8 s5
    SCENARIO_FILE=5_kal-kartha
    (PREVIEW_WML=
        title=_ "5 Kal-Kartha"
        difficulty=1
        gold=1
        recruit1=units/dwarves/fighter.png
        recruit2=units/dwarves/scout.png
        # recruit3=units/orcs/grunt.png
    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed
                   
    )


    (INCOMPLETE_APPROACHED=
        [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN(
            # no dialogue on first turn, so we don't overwhelm the player
        )} {ELSE(
            
                {FILTER_LOCATION x,y,radius=78,8,3}
              						 [message]
								speaker=dulcatos
								message= _ "Who approach Kal-Kartha?"
							[/message]
							[message]
								speaker=talin
								message= _ "We are peasants from Dwarven Doors. Knalga is under undead attack so Hamel sent us to seek help of Kal-Kartha."
							[/message]
							[message]
								speaker=dulcatos
								message= _ "I need to ask Lord Karrag can we give help to Knalga."
							[/message]
							[message]
								speaker=narrator
								message= _ "Dulcatos go to meet Karrag and return soon."
							[/message]
							[message]
								speaker=dulcatos
								message= _ "Karrag accepted to help his kin in Knalga but he want you to get rid of some monsters first."
							[/message]
        )} [/if]
    )
    (INCOMPLETE_MOVETO=
        [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN(
            [message]
                {FILTER_LOCATION x,y,radius=78,8,3}
                id=talin
                message= _ "If we help Karrag to defeat some monsters, he gave some of Kal-Karthan darwes to help his kind in Knalga."
            [/message]
        )} [/if]
    )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help dwarves of Knalga now! We have not time to Karrag's test."
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=78, 8, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
       [fire_event]
		name=recruit_darwes
	[/fire event]
					
	
    )
    (COMPLETED_MOVETO=
       							[message]
								speaker=dulcatos
								message= _ "We have given help to you. Now go to help Knalga."
							[/message]
    )
}




