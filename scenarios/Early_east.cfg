#Tell redward

{PLACE_POI 82 14 s7
    SCENARIO_FILE=7_kliffs_of_thoria
    (PREVIEW_WML=
        title=_ "7 Kliffs of thoria"
        difficulty=3
        gold=1
        recruit1=units/orcs/archer.png
        recruit2=units/orcs/grunt.png

    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed
                 [unit]
			facing="ne"
			name=_"Mortick"
			side=12
			type="Drake Clasher"
			x=83
			y=15
			id=drake
			
		[/unit]
  
    )


    (INCOMPLETE_APPROACHED=
        [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN(
            # no dialogue on first turn, so we don't overwhelm the player
        )} {ELSE(
            
                {FILTER_LOCATION x,y,radius=82,14,3}
              						[message]
							speaker=talin
							message= _ "We are peasants from Dwarven Door and we manged to escape slavery. We seek allies against undeads now."
						[/message]
			[message]
				speaker=drake
				message= _ "Stay away humans if you value your lives."
			[/message]
			[message]
				speaker=talin
				message= _ "They will not help us. But defeating drakes would make us good impression to orcs."
			[/message]
        )} [/if]
    )
    (INCOMPLETE_MOVETO=
        [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN(
            [message]
                {FILTER_LOCATION x,y,radius=82,14,1}
                id=talin
                message= _ "Drakes seem dangerous but are vulnaurable to pierce attacks. If we manage to defeat them convicing any ors to jois us will be much easier."
            [/message]
        )} [/if]
    )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help dwarves now!"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=82, 14, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
       		[set_variable]
			name=drakes_defeated
			value=yes
		[/set_variable]
		[message]
			speaker=talin
			message= _ "We defeated drakes. Now any orc tibe that want oppose Bloody Sword can see our might ad are more likely to ally with us."
		[/message]
					
	
    )
    (COMPLETED_MOVETO=
       							[message]
								speaker=talin
								message= _ "By defeating drakes here, we showed our power to all."
							[/message]
    )
