#define EARLY_EAST



#######################################################################################################################################################
#                                                                S4 - Capture Gryphons
#######################################################################################################################################################

#Declairing scenario failed
[event]
    name=prestart
       [if] 
		{LUA(<<return wesnoth.current.turn==5>>)} 
        	 {VARIABLE_CONDITIONAL status_s02 not_equals in_progress}
       		  {VARIABLE_CONDITIONAL status_s02 not_equals completed}
    {THEN(
        {VARIABLE status_s02 failed}
    )} [/if]
[/event]

#Tell how long time this scenario can be played
[event]
    name=prestart
    [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN( {VARIABLE s02_title _"Flight of the Elves - 2 season remaining"} )} [/if]
    [if] {LUA(<<return wesnoth.current.turn==2>>)} {THEN( {VARIABLE s02_title _"Flight of the Elves - 1 season remaining (last chance!)"}  )} [/if]
    # we don't play any approach message on turn 1. Reset approached_s02 so that we might play it on turn 2.
    [if] {LUA(<<return wesnoth.current.turn==2>>)} {THEN({CLEAR_VARIABLE approached_s02})} [/if]
[/event]

#Tell redward

{PLACE_POI 64 15 s4
    SCENARIO_FILE=4_capture_cryphons
    (PREVIEW_WML=
        title=_ "10 Lake Vrug"
        difficulty=1
        gold=1
        recruit1=units/dwarves/gryphon-master-flying-1.png
       
    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed
        [unit]
			facing="n"
			name=_"Kzssshh"
			side=5
			type="Gryphon"
			x=65
			y=13
			id=gryphon
			
		[/unit]            
    )


    (INCOMPLETE_APPROACHED=
        [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN(
            # no dialogue on first turn, so we don't overwhelm the player
        )} {ELSE(
            [message]
                {FILTER_LOCATION x,y,radius=65,13,3}
                id=gryphon
                message= _ "Kraa!"
            [/message]
        )} [/if]
    )
    (INCOMPLETE_MOVETO=
        [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN(
            [message]
                {FILTER_LOCATION x,y,radius=65,13,3}
                id=talin
                message= _ "There are wild cryphons flying on there. If we capture some, we can train Gryphon riders"
            [/message]
        )} [/if]
    )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help dwarves now!"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=65, 13, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
       
					
	
    )
    (COMPLETED_MOVETO=
        [message]
            speaker=talin
            message= _ "We captured many gryphons here."
        [/message]
    )
}

