			id="gold-coins-medium"
			image="items/gold-coins-medium.png"
			submerge=1
			visible_in_fog=no
			x=41
			y=7
		[/item]

		[item]
          		  image=rauta.png
        		    x,y=37, 36
       		 [/item]
		[item]
          		  image=rauta.png
        		    x,y=6, 5
       		 [/item]

		[item]
