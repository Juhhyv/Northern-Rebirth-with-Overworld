#textdomain wesnoth-NRO

[scenario]
  	  name= _ "6 Mining"
	id=6_mining
	map_data="{~add-ons/NR_openword/maps/6_mining.map}"
	turns=35
	victory_when_enemies_defeated=no
	next_scenario=openwordl
	carryover_percentage=50
	{UNDERGROUND}	
[side]
        side=1
        controller=human
        gold={ON_DIFFICULTY4 150 150 150 300}
        team_name=alliance
        user_team_name= _ "Talin"
        facing=nw
	save_id=talin
	type=Peasant
        id=talin
        name=_ "Talin"
        canrecruit=yes
	recruit= Dwarvish Miner
	shroud=yes

  [/side]
 [side]
        no_leader=no
        side=2
	team_name=bats
        hidden=yes
	gold={ON_DIFFICULTY4 150 180 250 500}
        color=black
	type=Dread Bat
	canrecruit=yes
	recruit=Blood Bat

	#ifdef NIGHTMARE

	[ai]
             [goal]
                name=target
                [criteria]
                    side=3
                [/criteria]
                value=1
            [/goal]
            [goal]
                name=target
                [criteria]
                    side=1
                [/criteria]
                value=3
            [/goal]
        [/ai]

	#endif
    [/side]


[side]
        side=3
        controller=ai
        gold={ON_DIFFICULTY4 100 125 175 400}
        team_name=ants
        user_team_name= _ "ANTS"
        facing=nw
	type=Giant Ant Queen
        id=enemy
        name=_ "Ant Queen"
        canrecruit=yes
	recruit=Giant Ant, Soldier Ant

  [/side]

[side]
        side=4
        controller=ai
        gold={ON_DIFFICULTY4 100 125 175 400}
        team_name=cavefolk
        user_team_name= _ "Cavefolk"
        facing=nw
	type=Ogre
        id=kilrar
        canrecruit=yes
	recruit=Ogre, Young Ogre, Goblin Spearman, Goblin Impaler, Goblin Rouser

  [/side]



	[event]
		name=prestart
		 [objectives]
                       [objective]
             		   description= _ "Mine monster food."
           		     condition=win
                       [/objective]

			[objective]
				description= _ "Death of Talin"
				condition=lose
			[/objective]
			[gold_carryover]
				bonus=yes
           		    	carryover_percentage=50
         		[/gold_carryover]

