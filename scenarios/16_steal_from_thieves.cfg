#textdomain wesnoth-NRO


[scenario]
  	  name= _ "16 Steal from thieves"
	id=16_steal_from_thieves
	map_data="{~add-ons/NR_openword/maps/16_steal_from_thieves.map}"
	turns=35
	victory_when_enemies_defeated=yes
	next_scenario=overworld 
	carryover_percentage=40
	 {DEFAULT_SCHEDULE_MORNING}

[side]
        side=1
        controller=human
        gold={ON_DIFFICULTY4 200 200 200 400}
        team_name=alliance
        user_team_name= _ "Talin"
        facing=nw
	save_id=talin
	type=Peasant
        id=talin
        name=_ "Talin"
        canrecruit=yes

  [/side]


[side]
		side=2
       		 controller=ai
       		 gold={ON_DIFFICULTY4 300 375 525 1200}
        team_name=orcs
        user_team_name= _ "Bloody Sword"
        facing=nw
	type=Orcish Warlord
        id=bogo
        name=_ "Bogo"
        canrecruit=yes
	recruit=Orcish Grunt,Orcish Archer,Orcish Assassin,Troll Whelp, Wolf Rider
	color=purple

    [/side]

	


	[event]
		name=prestart
		 [objectives]
                       [objective]
             		   description= _ "Defeat Bogo"
           		     condition=win
                       [/objective]
			[objective]
				description= _ "Death of Talin"
				condition=lose
			[/objective]			

		[/objectives]
		[item]
			image="items/gold-coins-large.png"
			submerge=1
			visible_in_fog=no
			x=9
			y=13
		[/item]
		[item]
			image="items/gold-coins-large.png"
			submerge=1
			visible_in_fog=no
			x=10
			y=15
		[/item]
		[item]
			image="items/gold-coins-large.png"
			submerge=1
			visible_in_fog=no
			x=8
			y=12
		[/item]
		[item]
			image="items/armor.png"
			submerge=1
			visible_in_fog=no
			x=5
			y=15
		[/item]
	

	
	
	[/event]
	[event]
        	name=start

	{RECALLCOMPANIONS}
	[message]
            speaker=bogo
            message= _ "What are coming from South-East?"
        [/message]
	[message]
            speaker=talin
            message= _ " So there Bloody Sword is keeping plunder from river trade and area between Wesmere and swamp. Better to defeat them before they move it to Glamdrol."
        [/message]
	[message]
            speaker=bogo
            message= _ "Slaves that killed Al-tar? Defeat them grunts! Let's brig them to Chief Rakhas in chaings."
        [/message]
	[/event]
	
	#Add this to every scenario where smalltalk is used. (expext 21 Abez)
[event]
        name=turn 3
        [fire_event]
		name=say_smalltalk
	[/fire_event]
[/event]
{GLOBAL__SMALLTALK}

	
	[event]
		name=last_breath
		[filter]
			id=bogo
		[/filter]
		[message]
			speaker=bogo
			message= _ "I lost all our pillage ..."
		[/message]
		[message]
         		 speaker=talin
          		message= _ "Now I take that armor."
      		[/message]
		[move_unit]
			id=talin
			to_x=5
			to_y=15
		[/move_unit]
		[remove_item]
					[filter]
						x=5
						y=15
					[/filter]
		[/remove_item]

		 [modify_unit]
                        [filter]
                            id=talin
                        [/filter]
                        [trait]
                        id=wesnothian_armor
                        name= _ "Wesnothian armor"
                        description= _ "This unit has Wesnothian armor that protect unit from physical damage."
                  

                        [effect]
                            apply_to = resistance
                            replace = yes
                            [resistance]
                                fire=100
                                arcane=90
                                impact=80
                                blade=60
                                cold=100
                                pierce=50
                            [/resistance]
                        [/effect]
			[effect]
            apply_to=new_ability
            [/effect]

                        [effect]
                            apply_to=overlay
                            add=armor.png
                        [/effect]
                        [/trait]
        [/modify_unit]
		[message]
         		 speaker=narrator
          		message= _ "New armor increases Talin's damage resistance to physical attacks."
      		[/message]

		[message]
         		 speaker=talin
          		message= _ "We also gain lots of gold."
      		[/message]

		[gold]
			side=1
			amount=1000
		[/gold]
		[endlevel]
        	   	result=victory
       		  	bonus=yes 
			carryover_add=yes
                [/endlevel]

	[/event]
	
	 [event]
        name=time over  
	[message]
			speaker=bogo
			message= _ "Our reinforcements have arrived!"
	[/message]
      
	[message]
            speaker=talin
            message= _ "We wasted too much time. We have no hope of victory here anymore."
        [/message]
	
    [/event]

	
	{HERODEATHS}
[/scenario]





