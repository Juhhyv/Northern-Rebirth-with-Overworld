#textdomain wesnoth-NRO

[scenario]
  	  name= _ "24 Protect Fishers"
	id=24_protect_fishers
	map_data="{~add-ons/NR_openword/maps/24_protect_fishers.map}"
	turns=25
	next_scenario=openwordl_later
	{DEFAULT_SCHEDULE_MORNING}
	carryover_percentage=40

	
[side]
        side=1
        controller=human
        gold={ON_DIFFICULTY4 200 200 200 400}
        team_name=alliance
        user_team_name= _ "Talin"
        facing=nw
	save_id=talin
	type=Peasant
        id=talin
        name=_ "Talin"
        canrecruit=yes

  [/side]

 [side]
        type=Shadow Mage
        facing=sw
        side=2
	name= _ "Daegwyryn"
        canrecruit=yes
        recruit=Rogue Mage,Thief,Trapper,Huntsman,Outlaw,Fugitive
        gold={ON_DIFFICULTY4 300 350 400 600}
        controller=ai
        [ai]
            recruitment_pattern=mixed fighter,mixed fighter,fighter,mixed fighter,archer
        [/ai]
        
        team_name=outlaws
        user_team_name=_"Outlaws"

    [/side]


[side]
        side=3
        controller=ai
        gold={ON_DIFFICULTY4 100 120 140 200}
        team_name=alliance
        user_team_name= _ "Wesnoth"
        facing=nw
	name= _ "Yddyn"
	type=Knight
        id=yddyn
        canrecruit=yes
	recruit=Spearman, Bowman, Fencer, Cavalryman
  [/side]
	
	{SILENTLY_LIMIT_LEADER_MOVES 3 3}

	[event]
		name=prestart
		 [objectives]
                       [objective]
             		   description= _ "Defeat Daegwyryn"
           		     condition=win
                       [/objective]
			[objective]
				description= _ "Death of Talin"
				condition=lose
			[/objective]
			[objective]
				description= _ "Death of Yddyn"
				condition=lose
			[/objective]
			[objective]
				description= _ "Oulaws move to a Fishing villlage (a village next to water)"
				condition=lose
			[/objective]


			[gold_carryover]
              			  bonus=yes
             			  carryover_percentage=40
          		[/gold_carryover]
		[/objectives]
		{RECALLCOMPANIONS}
	[/event]
	[event]
        name=start
	{RECALLCOMPANIONS}
        [message]
            speaker=talin
            message= _ "We escaped from slavery and defeated a lich. Now Bloody Sword is uniting orcs and prepraining war. Can you help us?"
        [/message]
	[message]
            speaker=yddyn
            message= _ "I am here to protect these fishers from outlaws. But If you help me to defeat them I will join you."
        [/message]
	[message]
            speaker=talin
            message= _ "We will do it."
        [/message]

    
	[/event]

	{LASTBREATHTALIN}
	
	[event]
		name=last_breath
		[filter]
			id=enemy
		[/filter]
		[message]
			speaker=enemy
			message= _ "Great Chief will not like this..."
		[/message]
	[/event]
	[event]
		name=last_breath
		[filter]
			id=yddyn
		[/filter]
		[message]
			speaker=yddyn
			message= _ "I failed to protect these villages."
		[/message]
		[endlevel]
        	  	 result=defeat
      		[/endlevel]

		[/event]
		
[event]
        name=capture
	first_time_only=no
        [filter]
            side=2
            [filter_location]
                terrain=Gs^Vh
            [/filter_location]
         [/filter]   
		
           [terrain]
         	   x=$x1
           	 y=$y1
         	   terrain=Gs^Vhr
        [/terrain]
	[message]
			speaker=yddyn
			message= _ "I failed to protect these villages."
	[/message]
	[endlevel]
        	  	 result=defeat
      	[/endlevel]
		
       
    [/event]

	[event]
        name=victory

        [message]
            id=yddyn
            message= _ "Outlaws are defeated and I join you."
        [/message]
        [modify_unit]
							[filter]
								id=yddyn
							[/filter]
							side=1
						[/modify_unit]
        [/event]

	
	{LASTBREATHTALIN}
[/scenario]




