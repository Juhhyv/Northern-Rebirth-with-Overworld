#textdomain wesnoth-NRO


[scenario]
  	  name= _ "16 Free Dwarves"
	id=16_free_dwarves
	map_data="{~add-ons/NR_openword/maps/16_free_dwarves.map}"
	turns=35
	victory_when_enemies_defeated=yes
	next_scenario=openwordl_later
	carryover_percentage=40
	 {DEFAULT_SCHEDULE_MORNING}

[side]
        side=1
        controller=human
        gold={ON_DIFFICULTY4 200 200 200 400}
        team_name=alliance
        user_team_name= _ "Talin"
        facing=nw
	save_id=talin
	type=Peasant
        id=talin
        name=_ "Talin"
        canrecruit=yes

  [/side]

[side]
        side=2
        controller=ai
        team_name=prey
        user_team_name= _ "Prey"
        no_leader=yes

  [/side]
	[side]
		side=3
       		 controller=ai
       		 gold={ON_DIFFICULTY4 100 125 175 400}
        team_name=gryphons
        user_team_name= _ "Wolves"
        facing=nw
	type=Direwolf
    	id=wolf_leader
        canrecruit=yes
	recruit=Wolf
	[/side]

[side]
		side=4
       		 controller=ai
       		 gold={ON_DIFFICULTY4 200 250 350 800}
        team_name=orcs
        user_team_name= _ "Bloody Sword"
        facing=nw
	type= Goblin Rouser
	 id=goblin
	color=purple
        canrecruit=yes
	recruit=Goblin Spearman

	[/side]


[side]
		side=5
       		 controller=ai
       		 gold={ON_DIFFICULTY4 250 325 500 1000}
        team_name=orcs
        user_team_name= _ "Bloody Sword"
        facing=nw
	type=Orcish Warlord
        id=enemy
        name=_ "Bogo"
        canrecruit=yes
	recruit=Orcish Grunt,Orcish Archer,Orcish Assassin,Troll Whelp
	color=purple

	[ai]
            village_value=0.75	# Weakened desire to capture villages
            caution=0.50	    # Wants to survive the duel
            [goal]
                name=target
                [criteria]
                    side=3
                [/criteria]
                value=0
            [/goal]
            [goal]
                name=target
                [criteria]
                    side=1
                [/criteria]
                value=3
            [/goal]
        [/ai]
    [/side]

	


	[event]
		name=prestart
		 [objectives]
                       [objective]
             		   description= _ "Defeat Bogo"
           		     condition=win
                       [/objective]
			[objective]
				description= _ "Death of Talin"
				condition=lose
			[/objective]			

		[/objectives]
		[item]
			id="gold-coins-medium"
			image="items/gold-coins-medium.png"
			submerge=1
			visible_in_fog=no
			x=19
			y=5
		[/item]
	[micro_ai]
        	    side=2
         	   ai_type=forest_animals
        	    action=add
	
        	    deer_type=Frost Stoat
            [filter_location]
                terrain=Gd, Aa, Ms, Ha, Hh, Aa^Fpa
            [/filter_location]
        [/micro_ai]
	
	[/event]
	[event]
        name=start
	 
	{PLACE_PRISONER_IMAGE units/dwarves/miner.png 31 7}
	{PLACE_PRISONER_IMAGE units/dwarves/miner.png 28 4}
	{PLACE_PRISONER_IMAGE units/dwarves/miner.png 25 4}

	{GENERIC_UNIT 2 (Frost Stoat) 6 5}
	{GENERIC_UNIT 2 (Frost Stoat) 33 9}
	{GENERIC_UNIT 2 (Frost Stoat) 31 13}
	{GENERIC_UNIT 2 (Frost Stoat) 17  20}

	{GENERIC_UNIT 2 (Great Icemonax) 27 22}
	{GENERIC_UNIT 2 ( Icemonax) 33 3}
	{GENERIC_UNIT 2 ( Icemonax) 5 17}
	{GENERIC_UNIT 2 ( Icemonax) 3 3}
	{GENERIC_UNIT 2 ( Giant Spider) 12 3}	

	

	{RECALLCOMPANIONS}
	[message]
            speaker=enemy
            message= _ "Dwarves are good at mining. Pity that we have only few of them as slaves. "
        [/message]
	[message]
            speaker=enemy
            message= _ " Are wolves aldready trained?"
        [/message]
	[message]
            speaker=goblin
            message= _ "It will take some more time."
        [/message]
	[message]
            speaker=camerin
            message= _ "Bah! What are coming from South-East?"
        [/message]
	[message]
            speaker=talin
            message= _ " So there Bloody Sword is keeping Dwarves as slaves and is mining metals. Better to defeat them now."
        [/message]
	[/event]
	

	[event]
		name=die
		[filter]
			id=wolf_leader
		[/filter]
		[set_achievement]
			content_for=nro
			id=packshattered
		[/set_achievement]
	[/event]

	[event]
		name=last_breath
		[filter]
			id=enemy
		[/filter]
		[message]
			speaker=enemy
			message= _ "Chief Rakhas will not like this..."
		[/message]
		[if]
					[have_unit]
						side=1
						race=orc
						search_recall_list=yes
					[/have_unit]
						[then]
							[message]
         							 speaker=goblin
          							 message= _ "We surrended!"
      							[/message]
							[message]
         							 speaker=talin
          							 message= _ "I accept. Now join my army."
      							[/message]
							[message]
         							 speaker=goblin
          							 message= _ "Yes!"
      							[/message]
							[fire_event]
								name=recruit_goblins
							[/fire_event]
							[modify_unit]
								[filter]
									side=4
								[/filter]
								side=1
							[/modify_unit]

						[/then]
						[else]

							[message]
         							 speaker=goblin
          							 message= _ "Bogo is defeated! Run!"
      							[/message]
						[/else]
		[/if]
		[message]
         		 speaker=talin
          		message= _ "Dwarves are now free. We can take all gold that they have mined."
      		[/message]
		[gold]
			side=1
			amount=300
		[/gold]
		[endlevel]
        	   	result=victory
       		  	bonus=yes 
                [/endlevel]

	[/event]
	[event]
		name=moveto
		[filter]
			x=19
			y=5
			side=1
		[/filter]
		[message]
			speaker=$unit.id
			message= _ "We found some gold"
		[/message]
		[gold]
			side=1
			amount=50
		[/gold]
		[remove_item]
					[filter]
						x=19
						y=5
					[/filter]
				[/remove_item]

	[/event]

[event]
        name=attack end
        first_time_only=no
	[filter]
		side=4
	[/filter]
        [filter_second]
            type=Wolf
            formula=(self.hitpoints < 15 )
            [and]
                formula=(self.hitpoints > 0 )
            [/and]
        [/filter_second]
        [fire_event]
            name=wolf_captured
            [primary_unit]
                id=$second_unit.id
            [/primary_unit]
        [/fire_event]
    [/event]

	[event]
		name=wolf_captured
		first_time_only=no
		[transform_unit]
			id=$unit.id
			transform_to=Wolf Rider
		[/transform_unit]
		[modify_unit]
		[filter]
			id=$unit.id
		[/filter]
			side=4
		[/modify_unit]

		[put_to_recall_list]
				id=$unit.id
			heal=yes
		[/put_to_recall_list]

    
	[/event]

	{NEWRECRUIT recruit_goblins (Wolf Rider, Goblin Spearman) (I can now recruit goblins.)}
	{LASTBREATHTALIN}
[/scenario]





