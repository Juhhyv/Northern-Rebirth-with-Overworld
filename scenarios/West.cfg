#define WEST



#######################################################################################################################################################
#                                                                S18 - Lady of Wesmere
#######################################################################################################################################################

#Declairing scenario failed
[event]
    name=prestart
       [if] 
		{IS_TURN 9} 
        	 {VARIABLE_CONDITIONAL status_s18 not_equals in_progress}
       		  {VARIABLE_CONDITIONAL status_s18 not_equals completed}
    {THEN(
        {VARIABLE status_s18 failed}
    )} [/if]
[/event]

#Tell how long time this scenario can be played



#Tell redward

{PLACE_POI 21 7 s18
    SCENARIO_FILE=18_Lady_of_Wesmere

    (PREVIEW_WML=
        title=_ "Lady of Wesmere"
        difficulty=2
        gold=1
        companion1=units/elves-wood/shyde.png
	    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed

		{PLACE_PRISONER_IMAGE units/elves-wood/shyde.png 20 7}		
    )


    (INCOMPLETE_APPROACHED=
                    [message]
                [filter_location]
			 x,y,radius=21,37,3
		[/filter_location]
                speaker=talin
                message= _ "Glamdrol, stronghold of Bloody Sword. They seem to have taken a hostage."
            [/message]
		[recall]
		id=Zlex
	[/recall]
	

		[if]
					[variable]
						name=treasury_stealed
						equals=yes
					[/variable]
					[then]
						[message]
							speaker=Zlex
							message= _ "It is an elf. I doupt that she like our help to saurians."
						[/message]
						[message]
							speaker=talin
							message= _ "She would prefer joining us over sitting in orc cage but her will to help us otherwise is not great."
						[/message]
					[/then]
					[else]

						[message]
							speaker=Zlex
							message= _ "It is an elf. Maybe she will join us if we free her."
						[/message]
					[/else]
		[/if]
	[put_to_recall_list]
		id=Zlex
	[/put_to_recall_list]
       
    )
    (INCOMPLETE_MOVETO=
        
            [message]
                [filter_location]
			x,y,radius=21,7,3
		[/filter_location]
                id=talin
                message= _ "Orcs have captured a high-ranking elf. If we free her, she will join us."
            [/message]
		
           )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
         	
            )


    (FAILED_MOVETO=
        [message]
            speaker=narrator
            message= _ "Lady of Wesmere cannot be freed anymore"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
			
        [remove_shroud]
              				      x,y,radius=21, 7, 5
         [/remove_shroud]
    )
    (JUSTCOMPLETED_START=
        
		[message]
			speaker=talin
			message= _ "We freed Lady of Wesmere. Now elves of Wesmere may help us more."
		[/message]
		[recall]
		id=captured_elf
	[/recall]
	[message]
            speaker=captured_elf
            message= _ "Thank you. I will join you in your fight against Bloody Sword."
        [/message]
	[message]
            speaker=captured_elf
            message= _ "We should go to Wesmere so I can give some elvish troops under your command. Also my relatives in Lintar Forest can help you."
        [/message]
	[recall]
		id=eryssa
	[/recall]
	[message]
            speaker=eryssa
            message= _ "Great to see you free, Lady."
        [/message]
	[put_to_recall_list]
		id=eryssa
	[/put_to_recall_list]
	[put_to_recall_list]
		id=captured_elf
	[/put_to_recall_list]


					
	
    )
    (COMPLETED_MOVETO=
       [recall]
		id=captured_elf
	[/recall]
	[message]
            speaker=captured_elf
            message= _ "Thank you fro freeing me from Bloody Sword."
        [/message]
	[put_to_recall_list]
		id=captured_elf
	[/put_to_recall_list]
    )
}

