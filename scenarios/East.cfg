#define EARLY_EAST



#######################################################################################################################################################
#                                                                S4 - Capture Gryphons
#######################################################################################################################################################

#Declairing scenario failed
[event]
    name=prestart
       [if] 
		{IS_TURN 5} 
        	 {VARIABLE_CONDITIONAL status_s04 not_equals in_progress}
       		  {VARIABLE_CONDITIONAL status_s04 not_equals completed}
    {THEN(
        {VARIABLE status_s04 failed}
    )} [/if]
[/event]


#Tell redward

{PLACE_POI 64 15 s4
    SCENARIO_FILE=4_capture_cryphons
    (PREVIEW_WML=
        title=_ "4 Capture Gryphons"
        difficulty=1
        gold=0
        recruit1=units/dwarves/gryphon-master-flying-1.png
       
    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed
        [unit]
			facing="n"
			name=_"Kzssshh"
			side=5
			type="Gryphon"
			x=65
			y=13
			id=gryphon
			
		[/unit]            
    )

	(INCOMPLETE_APPROACHED=
        
            
                [filter_location]
			 x,y,radius=64,15,3
		[/filter_location]
              					[message]
							speaker=gryphon
							message= _ "Kraa!"
						[/message]
				
			
		           )

   

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help dwarves now!"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=64, 15, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
       [message]
            speaker=talin
            message= _ "We captured many gryphons."
        [/message]

					
	
    )
    (COMPLETED_MOVETO=
        [message]
            speaker=talin
            message= _ "We captured many gryphons here."
        [/message]
    )
}


#######################################################################################################################################################
#                                                                S7 - Kliffs of Thoria
#######################################################################################################################################################

#Declairing scenario failed
[event]
    name=prestart
       [if] 
		{IS_TURN 5} 
        	 {VARIABLE_CONDITIONAL status_s07 not_equals in_progress}
       		  {VARIABLE_CONDITIONAL status_s07 not_equals completed}
    {THEN(
        {VARIABLE status_s07 failed}
    )} [/if]
[/event]

#Tell how long time this scenario can be played


#Tell redward
    {PLACE_POI 82 14 s7 
    SCENARIO_FILE=7_kliffs_of_thoria
    (PREVIEW_WML=
        title=_ "7 Kliffs of Thoria"
        difficulty=2
        gold=1
     	  recruit1=units/orcs/archer.png
      	  recruit2=units/orcs/grunt.png
	 recruit3=units/goblins/wolf-rider.png	)	

    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed
                 [unit]
			facing="ne"
			name=_"Mortick"
			side=12
			type="Drake Clasher"
			x=83
			y=15
			id=drake
			
		[/unit]
  
    )


    (INCOMPLETE_APPROACHED=
        
            
                [filter_location]
			 x,y,radius=82,14,3
		[/filter_location]
              					[message]
							speaker=talin
							message= _ "We are peasants from Dwarven Door and we manged to escape slavery. We seek allies against undeads now."
						[/message]
			
			[message]
				speaker=drake
				message= _ "Stay away humans if you value your lives."
			[/message]
			[message]
				speaker=talin
				message= _ "They will not help us. But defeating drakes would make us good impression to orcs."
			[/message]
           )
    (INCOMPLETE_MOVETO=
        
            [message]
                [filter_location]
			 x,y,radius=82,14,1
		[/filter_location]

                id=talin
                message= _ "Drakes seem dangerous but are vulnaurable to pierce attacks. If we manage to defeat them convicing any ors to jois us will be much easier."
            [/message]
          )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help dwarves now!"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=82, 14, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
       		[if]
					[variable]
						name=drakes_defeated
						equals=lake_vrug 
					[/variable]
					[then]
						[message]
							speaker=talin
							message= _ "We have defeated drakes twice and showed our might to all."
						[/message]
						[set_achievement]
							content_for=nro
							id=drakeslayer
						[/set_achievement]

					[/then]
					[/if]
						[set_variable]
							name=drakes_defeated
							value=clifss_of_thoria
						[/set_variable]
						[message]
							speaker=talin
							message= _ "We defeated drakes. Now Avro will ally with us."
						[/message]
						[message]
							speaker=warlord
							message= _ "You really defeated drakes. In that case we can ALLY with you."
						[/message]
						[fire_event]
							name=recruit_grunts
						[/fire_event]					
	
    )
    (COMPLETED_MOVETO=
       							[message]
								speaker=talin
								message= _ "By defeating drakes here, we showed our power to all."
							[/message]
    )
}


#######################################################################################################################################################
#                                                                S5 - Kal-Kartha
#######################################################################################################################################################

#Declairing scenario failed
[event]
    name=prestart
       [if] 
		{IS_TURN 5} 
        	 {VARIABLE_CONDITIONAL status_s05 not_equals in_progress}
       		  {VARIABLE_CONDITIONAL status_s05 not_equals completed}
    {THEN(
        {VARIABLE status_s05 failed}
    )} [/if]
[/event]

#Tell how long time this scenario can be played


#Tell redward

{PLACE_POI 78 8 s5
    SCENARIO_FILE=5_kal-kartha
    (PREVIEW_WML=
        title=_ "5 Kal-Kartha"
        difficulty=2
        gold=1
       recruit1=units/dwarves/fighter.png
        recruit2=units/dwarves/scout.png
    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed
                
  
    )


    (INCOMPLETE_APPROACHED=
                    
                [filter_location]
			 x,y,radius=78,8,3
		
		[/filter_location]
              						 [message]
								speaker=dulcatos
								message= _ "Who approach Kal-Kartha?"
							[/message]
							[message]
								speaker=talin
								message= _ "We are peasants from Dwarven Doors. Knalga is under undead attack so Hamel sent us to seek help of Kal-Kartha."
							[/message]
							[message]
								speaker=dulcatos
								message= _ "I need to ask Lord Karrag can we give help to Knalga."
							[/message]
							[message]
								speaker=narrator
								message= _ "Dulcatos go to meet Karrag and return soon."
							[/message]
							[message]
								speaker=dulcatos
								message= _ "Karrag accepted to help his kin in Knalga but he want you to get rid of some monsters first."
							[/message]
       
    )
    (INCOMPLETE_MOVETO=
        [if] {LUA(<<return wesnoth.current.turn==1>>)} {THEN(
            [message]
                [filter_location]
			x,y,radius=78,8,1
		[/filter_location]
                id=talin
                message= _ "If we help Karrag to defeat some monsters, he will give some of Kal-Karthan darwes to help his kin in Knalga."
            [/message]
        )} [/if]
    )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help dwarves of Knalga now! We have no time to test of Karrag."
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=82, 14, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
       		[fire_event]
			name=recruit_darwes
		[/fire_event]
	
    )
    (COMPLETED_MOVETO=
       							[message]
								speaker=dulcatos
								message= _ " We gave some troops to you. Go now to help Knalga!"
							[/message]
    )
	}


#enddef

#define LATE_EAST

