    {GENERIC_UNIT     6 "Elvish Hero"      99 20} {FACING se}
    {GENERIC_UNIT     6 "Elvish Hero"      96 13} {FACING nw}

[/event]

#Tell redward

{PLACE_POI 94 24 s19
    SCENARIO_FILE=19_lintar

    (PREVIEW_WML=
        title=_ "19 Lintar"
        difficulty=2
        gold=1
	otherlabel=_"New ally to last battle: <span color='#EFBF04'><b>Elves of Lintar</b></span>"
    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed

		[unit]
			facing="n"
			name=_"Dadak"
			side=4
			id=lintar_orc
			type="Orcish Warlord"
			x=93
			y=23
			
			
		[/unit]		
		
    )


    (INCOMPLETE_APPROACHED=
                    [message]
                [filter_location]
			 x,y,radius=94,24,3
		[/filter_location]
                id=talin
                message= _ "Bloody Sword had blockaded route to Lintar. Even if their blockkade is not very effective against elves we need defeat it to go Lintar"
            [/message]
		    )
    (INCOMPLETE_MOVETO=
        
            [message]
                [filter_location]
			x,y,radius=94,24,3
		[/filter_location]
                id=talin
                message= _ "If we defeat Bloody Sword's forces here, elves of Lintar will help us."
            [/message]
		
           )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
        [unit]
			facing="n"
			name=_"Dadak"
			side=4
			id=lintar_orc
			type="Orcish Warlord"
			x=93
			y=23
			
			
		[/unit]		
  )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to attack to Glamdrol now!"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=94, 24, 5
         [/remove_shroud]

 			
        
    )
    (JUSTCOMPLETED_START=
        
		[move_unit]
				id=talin
				to_x=94
				to_y=20
			[/move_unit]
			[remove_shroud]
              				      x,y,radius=94, 20, 5
         		[/remove_shroud]

			[message]
				speaker=talin
				message= _ "We escaped from slavery and defeated a lich. Now Bloody Sword is uniting orcs and prepraining war. Can elves of Lintar help us?"
			[/message]
				[if]
					[have_unit]
						side=1
						id=captured_elf
						search_recall_list=yes
					[/have_unit]
					[then]
						[unit]
							id=captured_elf
							side=1
							x, y = 95, 19
						[/unit]
						[message]
							speaker=captured_elf
							message= _ "Thye also free me from orcs. Surely you can help?"
						[/message]
						[set_achievement]
							content_for=nro
							id=elven_diblomacy
						[/set_achievement]
					[/then]
				[/if]
			[message]
				speaker=lintar_elf
				message= _ "As Kalenz is not present, it fall to me to make this decision."
			[/message]
			[message]
				speaker=lintar_elf
				message= _ "We will join you in attack against Bloody Sword."
			[/message]
			[set_variable]
                               name=lintar_allied
                       		value=yes
      			 [/set_variable]
					
	
    )
    (COMPLETED_MOVETO=
        [message]
            speaker=talin
            message= _ "We defeated Bloody Sword here and we will defeat them again at Glamdrol."
        [/message]
    )
	}


