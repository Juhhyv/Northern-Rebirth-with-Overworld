#textdomain wesnoth-NRO



[scenario]
    id=25_Glamdrol
    name= _ "25 Glamdrol"
    map_file=25_Glamdrol.map
    {DEFAULT_SCHEDULE}
    turns=-1
    next_scenario=epilogue
	carryover_percentage=40%
    

#define WESNOTH_GUARD X Y

	[unit]
		type=Pikeman
		side=3
		x={X}
		y={Y}
		max_moves=0
		[modifications]
                		{TRAIT_LOYAL}
               			{TRAIT_RESILIENT}
          	[/modifications]
	[/unit]
#enddef 

#define BLOODY_SWORD_GUARD X Y

	[unit]
		type=Orcish Warrior
		side=4
		x={X}
		y={Y}
		role=guard
		max_moves=0
		[modifications]
                		{TRAIT_LOYAL}
               			{TRAIT_RESILIENT}
          	[/modifications]
	[/unit]
#enddef 

#define TROLL_GUARD X Y

	[unit]
		type=Troll
		side=4
		x={X}
		y={Y}
		role=guard
		max_moves=0
		[modifications]
                		{TRAIT_LOYAL}
               			{TRAIT_RESILIENT}
          	[/modifications]
	[/unit]
#enddef 




    # Players side - Talin
    [side]
        type=Peasant
        id=talin
        name=_ "Tallin"
        canrecruit=yes
        side=1
        controller=human
        team_name=alliance
        user_team_name=_"Alliance"
	gold={ON_DIFFICULTY4 200 200 200 400}
    
  
[/side]

  {STARTING_VILLAGES 1 5}

	#Dwarves

[side]
        type=Dwarvish Lord
        id=hamel
        name= _ "Hamel"
	save_id=guardian
        canrecruit=yes
        side=2
        controller=human
        gold={ON_DIFFICULTY4 500 500 500 1000}
        recruit=Dwarvish Steelclad,Dwarvish Thunderguard,Dwarvish Stalwart
        team_name=alliance
        user_team_name=_"Alliance"
        persistent=yes
        {FLAG_VARIANT knalgan}
        [modifications]
            {TRAIT_STRONG}
        [/modifications]
    [/side]
	 {STARTING_VILLAGES 2 5}

[side]
        side=3
        color=red
        type=General
        id=general
        canrecruit=yes
        recruit=Swordsman,Pikeman,Dragoon,Shock Trooper,Longbowman,Red Mage,White Mage,Spearman,Heavy Infantryman,Bowman
        gold={ON_DIFFICULTY4 200 250 300 600}
        income={ON_DIFFICULTY4 20 25 30 50}
        controller=ai
	{SILENTLY_LIMIT_LEADER_MOVES 3 2}
	team_name=alliance
        user_team_name=_"Wesnoth"
[/side]
	

    # Enemy
    [side]
        name=_"Chief Rakhas"
	side=4
	type="Orcish Sovereign"
	id=rakhas 
        recruit=Orcish Warrior,Orcish Slayer,Troll,Troll Rocklobber,Orcish Crossbowman, Wolf Rider
        gold={ON_DIFFICULTY4 1200 1500 2100 4800}
        income={ON_DIFFICULTY4 20 40 100 120}
        team_name=orcs
        user_team_name=_"Bloody Sword"
                {FLAG_VARIANT6 ragged}
      # Sidekicks
    [unit]
        type=Orcish Warlord
        id="Ha'Tuil"
        name= _ "Ha’Tuil"
        canrecruit=yes
        side=4
	role=guard
	x,y=31, 13
   [/unit]

    [unit]
        type=Orcish Warlord
        id="Ar'Muff"
        name= _ "Ar’Muff"
        canrecruit=yes
        side=4
	role=guard
	x,y=11, 13
    [/unit]
    
    [unit]
        type=Orcish Warlord
        id=Calter
        name= _ "Calter"
        canrecruit=yes
        side=4
	role=guard
    	x, y=22, 22
      [/unit]
   
    [unit]
        type=Orcish Warlord
        id=Halter
        name= _ "Halter"
        canrecruit=yes
        side=4
	role=guard
	x, y = 39, 16
    [/unit]
	[/side]
 {STARTING_VILLAGES 4 8}
    
     # Side for White Fangs 
      [side]
        name=_"Chief Ikhig"
	side=5
	id=ikhig
	type="Orcish Warlord"
        recruit=Orcish Warrior,Orcish Slayer,Troll,Troll Rocklobber,Orcish Crossbowman
        gold={ON_DIFFICULTY4 300 350 400 800}
         income={ON_DIFFICULTY4 20 30 40 55}
        team_name=alliance
        user_team_name=_"White Fangs "
[/side]
	#Shadow mages side
[side]
        type=Shadow Lord
        id=Seraeran
        name= _ "Seraeran"
        facing=sw
        side=6
        canrecruit=yes
        recruit=Rogue Mage,Shadow Mage,Thief,Trapper,Huntsman,Outlaw,Fugitive
        gold={ON_DIFFICULTY4 300 350 400 800}
	income={ON_DIFFICULTY4 20 30 40 55}
        controller=ai
        [ai]
            recruitment_pattern=mixed fighter,mixed fighter,fighter,mixed fighter,archer
        [/ai]
        shroud=yes
        fog=yes
        share_vision=all
        team_name=alliance
        user_team_name=_"Outlaws"

    [/side]

#Lintar elves' side

	[side]
		type=Elvish Marshal
		id=lintar_elf
		facing=se
		side=7
		controller=ai
		user_team_name= _ "Lintar Elves"
		team_name=alliance
		recruit=Elvish Sorceress , Elvish Scout, Elvish Hero,  Elvish Ranger, Elvish Druid, Elvish Marksman,  Elvish Rider
		gold={ON_DIFFICULTY4 300 400 500 800}
		income={ON_DIFFICULTY4 20 30 40 55}
	[/side]


    [event]
        name=prestart
        
	# Some guards to Wesnoth 
		{WESNOTH_GUARD 37 4} 
		{WESNOTH_GUARD 39 6} 
		{WESNOTH_GUARD 41 7} 
		{WESNOTH_GUARD 43 8} 
		{WESNOTH_GUARD 47 7} 
	
	#Guars to Bloody Sword
		{BLOODY_SWORD_GUARD 38 18}
		{BLOODY_SWORD_GUARD 37 19}	
		{BLOODY_SWORD_GUARD 34 21}
		{BLOODY_SWORD_GUARD 32 22}
		{BLOODY_SWORD_GUARD 38 12}
		{BLOODY_SWORD_GUARD 37 12}
		{BLOODY_SWORD_GUARD 17 22}
		{BLOODY_SWORD_GUARD 16 21}
		{BLOODY_SWORD_GUARD 8 21}
		{BLOODY_SWORD_GUARD 7 21}
		{TROLL_GUARD 7 13}
		{TROLL_GUARD 11 11}
		{TROLL_GUARD 12 10}
		{TROLL_GUARD 13 11}

        # Set the objectives
        [objectives]
            side=1, 2
            [objective]
                description= _ "Defeat the enemy leaders"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Tallin"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Hamel"
                condition=lose
            [/objective]

            {IS_LAST_SCENARIO}
        [/objectives]
    [/event]

    [event]
        name=start
	
		#Kill leaders and change controller to null all sides that don't join battle
			[if]
					[variable]
						name=wesnoth_ally
						equals=no
					[/variable]
					[then]
						[kill]
							side=3
						[/kill]
						[modify_side]
							side=3
							controller=null
						[/modify_side]
					[/then]
			[/if]
			[if]
					[variable]
						name=whiteving_ally
						equals=no
					[/variable]
					[then]
						[kill]
							id=ikhig
						[/kill]
						[modify_side]
							side=5
							controller=null
						[/modify_side]

					[/then]
			[/if]
			[if]
					[variable]
						name=Seraeran_allied
						equals=no
					[/variable]
					[then]
						[kill]
							id=Seraeran
						[/kill]
						[modify_side]
							side=6
							controller=null
						[/modify_side]

					[/then]
			[/if]
			[if]
					[variable]
						name=lintar_allied
						equals=no
					[/variable]
					[then]
						[kill]
							id=lintar_elf
						[/kill]
						[modify_side]
							side=7
							controller=null
						[/modify_side]

					[/then]
			[/if]

			[if]
					[variable]
						name=doors_free
						equals=yes
					[/variable]
					[then]
						[modify_side]
							side=1
							 income={ON_DIFFICULTY4 20 20 20 40}
						[/modify_side]
					[/then]
				[/if]
		{RECALLCOMPANIONS}
		[message]
			speaker=talin
			message= _ "Everyone in position? Now is time to kill Chief Rakhas and broke Bloody Sword."
		[/message]
    [/event]


	#Bloody Sword reserves
  [event]
        name=last breath
        [filter]
            role=guard
        [/filter]

        [message]
            id=rakhas
            message= _ "They are breaking into Glamdrol. Reserves!"
        [/message]
        [gold]
            side=4
            amount={ON_DIFFICULTY4 200 300 500 800}
        [/gold]
    [/event]
			
            # Victory
    [event]
        name=victory

        [message]
            id=talin
            message= _ "At last! Chief Rakhas has been slain, and the Bloody Sword's host has been crushed. Peace and prosperity will come to the Northlands once again!"
        [/message]
        [message]
            speaker=narrator
            message= _ "At these words all the allied forces gave out a combined and thunderous cheer. The war was finally over."
            image=wesnoth-icon.png
        [/message]
        [/event]

    # Hamel death
    [event]
        name=last breath
        [filter]
            id=hamel
        [/filter]

        [message]
            id=hamel
            message= _ "Argh!"
        [/message]
        [message]
            id=talin
            message= _ "Hamel! Blast it, without the dwarves to hold the western flank we are as good as defeated."
        [/message]
        [endlevel]
            result=defeat
        [/endlevel]
    [/event]

	#Add this to every scenario where smalltalk is used. (expext 21 Abez)
[event]
        name=turn 7
        [fire_event]
		name=say_smalltalk
	[/fire_event]
[/event]
{GLOBAL__SMALLTALK}

	#Add this to every scenario where smalltalk is used. (expext 21 Abez)
[event]
        name=turn 35
        [fire_event]
		name=say_smalltalk
	[/fire_event]
[/event]
{GLOBAL__SMALLTALK}

# Chief Rakhas Die
[event]
		name=last breath
		[filter]
			id=rakhas
		[/filter]
		[filter_second]
			[or]
				id=talin
			[/or]
			id=Zlex
		[/filter_second]
		[set_achievement]
			content_for=nro
			id=personal_vengace
		[/set_achievement]
		[message]
			speaker=rakhas
			message= _ "Worms killed me... but Bloody Sword will have revenge!"
		[/message]
	[/event]


[event]
        name=last breath
        [filter]
            id=general
        [/filter]

        [message]
            id=general
            message= _ "Wesnoth can't help you anymore!"
        [/message]
        [message]
            id=talin
            message= _ "We can still win."
        [/message]
    [/event]
{HERODEATHS}    


[/scenario]
