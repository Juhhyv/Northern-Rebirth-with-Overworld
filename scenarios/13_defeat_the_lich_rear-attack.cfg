   [event]
        name=confront_malifor
        first_time_only=yes

        [remove_shroud]
            side=1
            x=23-35
            y=3-10
        [/remove_shroud]

        [delay]
            time=500
        [/delay]

        [scroll_to_unit]
            id=Malifor
        [/scroll_to_unit]

        [message]
            speaker=Malifor
            message= _ "You wretched vermin, I have had it with you! Guards!"
        [/message]

        
        [gold]
            side=2
            amount={ON_DIFFICULTY4 200 250 350 800}
        [/gold]
[/event]

