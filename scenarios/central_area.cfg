#define CENTRAL_AREA

#######################################################################################################################################################
#                                                                S3 - In the mines
#######################################################################################################################################################

#Declairing scenario failed
[event]
    name=prestart
       [if] 
		{IS_TURN 5} 
        	 {VARIABLE_CONDITIONAL status_s3 not_equals in_progress}
       		  {VARIABLE_CONDITIONAL status_s3 not_equals completed}
    {THEN(
        {VARIABLE status_s3 failed}
    )} [/if]
[/event]


#Tell how long time this scenario can be played


#Tell redward

{PLACE_POI 45 12 s3
    SCENARIO_FILE=3_In_the_mines
    (PREVIEW_WML=
        title=_ "3 In the Mines"
        difficulty=2
        gold=0
        recruit1=units/human-loyalists/spearman.png
        recruit2=units/human-loyalists/bowman.png
        recruit3=units/human-loyalists/heavyinfantry.png
    )


    #############################
    # INCOMPLETE
    #############################
    (INCOMPLETE_PRESTART=
       	#This unit should disappear when scenario is completed
                     
    )


    (INCOMPLETE_APPROACHED=
                   [message]
                [filter_location]
			 x,y,radius=45,11,2
		[/filter_location]
		#Mine ore, but it is used to produce iron
                id=hamel
                message= _ "You are now near the iron mines. Dwarves can mine iron to you but you need to protect them from undeads."
            [/message]
       	
    )
    (INCOMPLETE_MOVETO=
      
            [message]
                [filter_location]
			x,y,radius=45,12,3
		[/filter_location]
                id=talin
                message= _ "We can mine iron here. It would allow us to use better equipment"
            [/message]
        
    )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help drarwes defeat the lich now!"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=47, 6, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
         
	[message]
            speaker=hamel
            message= _ "We can now produce weapons to you."
        [/message]
	[message]
            speaker=talin
            message= _ "It will allow us to use better troops."
        [/message]

					
	
    )
    (COMPLETED_MOVETO=
        [message]
            speaker=talin
            message= _ "We protcted here miners and now dwarves have iron to produce weapons."
        [/message]
    )
}




#######################################################################################################################################################
#                                                                S12 - Elvish Route
#######################################################################################################################################################

