    #############################
    (INCOMPLETE_PRESTART=
        
	#This unit should disappear when scenario is completed
                [unit]
			facing="s"
			side=3
			type="Banebow"
			x=38
			y=15
			role=second_route_guard
		[/unit]    )


    (INCOMPLETE_APPROACHED=
                    [message]
                [filter_location]
			 x,y,radius=58,10,3
		[/filter_location]
                id=talin
                message= _ "Undeads seem to guard route to underground. We can fight here, but without dwarves of Knalga. Maybe elves will help us as we are so near Wesmere forest."
            [/message]
       
    )
    (INCOMPLETE_MOVETO=
             [message]
                [filter_location]
			x,y,radius=39,15,3
		[/filter_location]
                id=talin
                message= _ "We need to defeat undeads here if we want to go underground. It would allow us to attack against lich with surprise but without dwarves support."
            [/message]
		
           )

    #############################
    # FAILED
    #############################
    (FAILED_PRESTART=
            #This unit should disappear when scenario is completed
                [unit]
			facing="s"
			side=3
			type="Banebow"
			x=38
			y=15
			role=second_route_guard
		[/unit]    )


    (FAILED_MOVETO=
        [message]
            speaker=talin
            message= _ "We need to help dwarves now!"
        [/message]
    )

    #############################
    # COMPLETED
    #############################

    (COMPLETED_PRESTART=
	[remove_shroud]
              				      x,y,radius=58, 10, 5
         [/remove_shroud]
        
    )
    (JUSTCOMPLETED_START=
        #Redwad from lake Vurg is handled in-scenario. This event open route to library. Macro KEEP_VICTORIES keep route open after next fight. 
	
	[recall]
		id=eryssa
	[/recall]
	
	[message]
            speaker=eryssa
            message= _ "My fairie fire will burn undeads that threat Wesmere. I join you."
        [/message]
	[message]
            speaker=talin
            message= _ "We can now contunue our journey to underground or return to dwarves."
        [/message]
	[put_to_recall_list]
		id=eryssa
	[/put_to_recall_list]

					
	
    )
    (COMPLETED_MOVETO=
        [recall]
		id=eryssa
	[/recall]
	
	[message]
            speaker=eryssa
            message= _ "Thanks for helping defeat undeads that threted Wesmere."
        [/message]
	[put_to_recall_list]
		id=eryssa
	[/put_to_recall_list]

    )
}

