	{PRESTART}
	{SIGHTED_EVENTS}
		
	
	#Start evet
	
	[event]
		name=start
		{KEEPVICTORY}
		[modify_turns]
         		   value,current=-1, $battles_fight
 	       [/modify_turns]
		[scroll_to]
			x,y= $herox, $heroy
			immediate=yes
		[/scroll_to]
		[unit]
			facing="ne"
			name=_"Talin"
			side=1
			type="Peasant"
			id=talin
			x=$herox
			y=$heroy
			{TRAIT_INTELLIGENT}
			{TRAIT_RESILIENT}
			canrecruit=yes
			extra_recruit=Peasant, Woodsman, Ruffian

			[abilities]
       				 {ABILITY_SKIRMISHER}
  			 [/abilities]

		[/unit]
	[modify_unit]
			{FILTERTALIN}
		
		[effect]
			
			apply_to=movement_costs
			replace=yes
			
			[movement_costs]
                 	   shallow_water,reef=10,2
                	    flat,sand,frozen=1,1,1
               		     village,castle=1,2
			deep_water,swamp_water=10, 7
                  	  forest,hills,mountains,unwalkable= , , , 

              		  [/movement_costs]	
		[/effect]
			attacks_left=0
	[/modify_unit]
	
	[remove_shroud]
                      x,y,radius=$herox, $heroy, 5
         [/remove_shroud]
		[fire_event]
			name=$victory
		[/fire_event]


	# Make moving from Knalga to Gryphons faster
	[item]
	x, y = 53, 15
	image= scenery/trapdoor-open.png
	[/item]
	[item]
	x, y = 62, 15
	image= scenery/trapdoor-open.png
	[/item]

	[tunnel]
		[filter]
			
		[/filter]
		[source]
		x, y = 53, 15
		[/source]
		[target]
		x,y = 62, 15
		[/target]
	[/tunnel]
	[tunnel]
		[filter]
			
		[/filter]
		[source]
		x, y = 62, 15
		[/source]
		[target]
		x,y = 53, 15
		[/target]
	[/tunnel]
		
	#don't allow player to gain gold or attack by disabling ending turn
		[disallow_end_turn]
		[/disallow_end_turn]
					
	[/event]



	
	#Give back Talin's mp
	[event]
            name=moveto
            first_time_only=no
           	{FILTERTALIN}
            [heal_unit]
               {FILTERTALIN}

                moves=full
            [/heal_unit]
		[modify_unit]
		[filter]
			id=talin
		[/filter]
			attacks_left=0
		[/modify_unit]

        [/event]
	
	


	#Whitewing event
	[event]
		name=moveto
		first_time_only=no
		[filter]
			x=75-79
			y=21-25
		[/filter]
		[message]
			speaker=talin
			message= _ "Whitewings are most powerful tribe that has not subjucated to Bloody Sword. We will gain nothing by fight against them."
		[/message]
		[move_unit]
			id=talin
			to_x=74
			to_y=19
		[/move_unit]
	[/event]

		
#Ford Abez
	[event]
		name=moveto
		first_time_only=no
		[filter]
			y=25-35
			x=45-52
		[/filter]
		[message]
			speaker=talin
			message= _ "Bloody Sword's blockade at ford Abez is too strong to us now."
		[/message]
		[move_unit]
			id=talin
			to_x=50
			to_y=18
		[/move_unit]
	[/event]

	#Singpost
	[event]
		name=moveto
		[filter]
			x=76
			y=16
		[/filter]
		[message]
			speaker=narrator
			message= _ "North- Kal Kartha
East- Clifs of Thoria"
		[/message]
	[/event]

	#Campaing Start

	[event]
		name=begin
		[message]
				speaker=talin
				message= _ "We defeated both orcs. Move all supplies that you find into the tunnels. We need to find the dwarves of Knalga"
			[/message]
			[move_unit]
				id=talin
				to_x=47
				to_y=15
			[/move_unit]
			[message]
				speaker=talin
				message= _ "Dwarves are under undead attack!"
			[/message]
	[/event]
	


	

		#Dwarves need help
			[event]
				name=turn 4
				[if]
					[variable]
						name=route_open
						equals=no
					[/variable]
					[then]
			[unit]
				type=Dwarvish Scout
				side=2
				x, y= 54, 12
				id=messanger
			[/unit]
			[move_unit]
				id=messanger
				to_x=$herox
				to_y=$heroy
			[/move_unit]
			[message]
				speaker=messanger
				message= _ "We need now help against undead!"
			[/message]
			[message]
				speaker=talin
				message= _ "I come to help."
			[/message]


						
						[/then]
					[else]
						[message]
							speaker=talin
							message= _ "Only one battle and we need to face the lich."
						[/message]
					[/else]
				[/if]
		[/event]

		[event]
			name=turn 5
				[objectives]
			
			[objective]
				description= _ "Destroy source of undeads."
				condition=win
			[/objective]
			[objective]
				description= _ "Death of Talin"
				condition=lose
			[/objective]
			[objective]
				description= _ "Undeads defeat dwarves"
				condition=lose
			[/objective]

				[/objectives]
			[unit]
				type=Dwarvish Scout
				side=2
				x, y= 54, 12
				id=messanger
			[/unit]
			[move_unit]
				id=messanger
				to_x=$herox
				to_y=$heroy
			[/move_unit]
			[message]
				speaker=messanger
				message= _ "Lord Hamel ordered Buitfur to destroy the lich now."
			[/message]

			[message]
				speaker=talin
				message= _ "Time to face the lich."
			[/message]
		[/event]

		[event]
			name=turn 6
			[message]
				speaker=talin
				message= _ "Undeads killed dwarves. We cannot win alone."
			[/message]

			[endlevel]
        	 	   result=defeat
             	  	 [/endlevel]
		[/event]

	#Differrent batles that player can play
	{BATLE 46 14 (We can help our darwish friends to defeat undeads) 2_help_darwes open_route open_route} #first battle against undead
	{BATLE 45 12 (We can mine iron here. It would allow us to use better equipment) 3_In_the_mines iron_mined iron_mined}
	{BATLE 54 12 (We can mine monster food and gold here. It would allow us to recruit Dwarvish Thunderers) 6_mining recruit_thunders thunders}
	{BATLE 64 15 (There are wild cryphons flying on there. If we capture some, we can gain Gryphon riders.) 4_capture_cryphons cyphons 2}	
	{BATLE 78 8 (If we help Karrag to defeat some monsters, he gave some of Kal-Karthan darwes to help his kind in Knalga. If it succees I can recruit Darwish scouts and Drawish warriors.) 5_kal-kartha recruit_darwes kal_kartha} # Karrakg wants some humans to die?
	{BATLE 82 14 (Drakes seem dangerous but are vulnaurable to pierce attacks. If we manage to defeat them convicing any ors to jois us will be much easiaer) 7_kliffs_of_thoria drakes_defeated 4} # In early Nort Alliance is orcs but not drakes
	{BATLE 41 13 (We can now defeat undead leader and with him, all undead will fall. There may be also be something valuable hided somewhere.) 9_defeat_the_lich marionetes_fall fix}
	{BATLE 39 12 (We can now defeat undead leader and with him, all undead will fall. It would still be better idea to use other route and have Dwarvish allies with us.) 9b_defeat_the_lich marionetes_fall fix}
	{BATLE 39 15 (We need to defeat undeads here if we want to go underground. Maybe elves will help us as they are so near Wesmere forest) 12_elvish_route is_this_needed second_route_open}
	{BATLE 38 23 (Outlaws under Salizz will train us if we help them to steal Wesmere's treasyry.) 08_elves_treasury recruit_outlaws treasury_stealed}
	 {BATLE 46 8 (In ruined library we can learn to recruit mages. There is also some useful items.) 11_library library library}
	{BATLE 41 6 (If we manage to save those ulfsekers, they will surely join us. I may even recruit Darwish Ulfsekers) 14_save_Bumacatlas ulfsekers ulfsekers}
	{BATLE 47 6 (Drakes and orcs fight each other. We can fight our way to ruined library where we can learn recruit mages and found useful items.) 10_Lake_Vrug lake_vrug_reward lake} #From old EI
	
	#Reward from defeating frist undeads
	[event]
		name=open_route
		[kill]
			role=assault_undead
		[/kill]
		[set_variable]
			name=route_open
			value=yes
		[/set_variable]
		[message]
			speaker=guardian
			message= _ "Thanks of your help. We were hard pressed by those undeads."
		[/message]
		[message]
			speaker=guardian
			message= _ "If you are not yet ready to battle against lich, then go to our mines or east. Erupted volcano opened route there decades ago." 
		[/message]
	[/event]

	#Reward from defeating drakes
	[event]
		name=drakes_defeated
		[set_variable]
			name=drakes_defeated
			value=yes
		[/set_variable]
		[message]
			speaker=talin
			message= _ "We defeated drakes. Now any orc tibe that want oppose Black Sword can see our might ad are more likely to ally with us."
		[/message]
	[/event]

	#Ulfsekers reward
[event]
		name=ulfsekers
		[kill]
			id=bumacatlas
		[/kill]
		[fire_event]
			name=recruit_ulfsekers
		[/fire_event]
	[/event]

	#Redwad from lake Vurg is handled in-scenario. This event open route to library. Macro KEEP_VICTORIES keep route open after next fight. 
	[event]
		name=lake_vrug_reward
					[kill]
						id=library_guard
					[/kill]
	[/event]



	#Redwad from defeating the lich
	[event]
		name=marionetes_fall
		[kill]
			race=undead
		[/kill]
		[message]
			speaker=talin
			message= _ "Lich is defeated and dwarves can now breath more freely."
		[/message]
		 [endlevel]
        	    result=victory
       		     bonus=yes # 
                  [/endlevel]
	[/event]
	

	#Other redwards
	{NEWRECRUIT recruit_thunders (Dwarvish Thunderer) (We mined gold and monster food. Now I can recruit Darwish Thunderes.)}
	{NEWRECRUIT recruit_grunts (Orcish Grunt, Orcish Archer) (We conviced this small tibe to join us. Now I can recruit Orc Grunts and and archers)}
	{NEWRECRUIT recruit_darwes (Dwarvish Scout, Dwarvish Fighter) (Karrag accept help his kin in Knalga. I can now recruit Darwish souts and warriors, but I should go to help Knalga fast.)}
	{NEWRECRUIT recruit_saurians (Saurian Skirmisher, Saurian Augur) (Saurians accepted! Now I can recruit Saurian skirmishers and Saurian augurs)}
	{NEWRECRUIT recruit_outlaws (Footpad, Thug, Poacher) (We learn fighting skils from outlaws. I can now recruit Footbads, Thugs and Poachers.)}
	{NEWRECRUIT recruit_mages (Mage) (We learned in library how to train mages. Now I can recruit them.)}
	{NEWRECRUIT recruit_assasins (Orcish Assassin) (Avo allow us to recruit Orcish assasins.)}
	

[/scenario]
